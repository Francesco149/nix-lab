[bot]
nick = "shigebot"
bot_id = "1464760155"
prefix = "!"
working_dir = "/var/lib/shigebot"
gist_refresh_interval = 300
script_timeout = 30

refresh_user_limit  = 10
refresh_user_window = 60.0

rate_limit_window           = 30.0
