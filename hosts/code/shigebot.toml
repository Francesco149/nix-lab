  "#twitter",
  "#translate",
  "#lurk",
  "#logs",
  "#log_pull",
  "#simple",
  "#markov",

  "-ratelimit",
  "-openrouter",
  "-log_utils",
  "-lurk_db"
]

lolisamurai = [
  "hi",

  "#translate",
  "#lurk",
  "#twitter"
]

